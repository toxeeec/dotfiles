key_bindings:
  - { key: W, mods: Command, chars: "\x02x" }
  - { key: T, mods: Command, chars: "\x02c" }
  - { key: Left, mods: Command, chars: "\x02\e[D" }
  - { key: Right, mods: Command, chars: "\x02\e[C" }
  - { key: Key0, mods: Command, chars: "\x020" }
  - { key: Key1, mods: Command, chars: "\x021" }
  - { key: Key2, mods: Command, chars: "\x022" }
  - { key: Key3, mods: Command, chars: "\x023" }
  - { key: Key4, mods: Command, chars: "\x024" }
  - { key: Key5, mods: Command, chars: "\x025" }
  - { key: Key6, mods: Command, chars: "\x026" }
  - { key: Key7, mods: Command, chars: "\x027" }
  - { key: Key8, mods: Command, chars: "\x028" }
  - { key: Key9, mods: Command, chars: "\x029" }
  - { key: Key0, mods: Control, chars: "\e0" }
  - { key: Key1, mods: Control, chars: "\e1" }
  - { key: Key2, mods: Control, chars: "\e2" }
  - { key: Key3, mods: Control, chars: "\e3" }
  - { key: Key4, mods: Control, chars: "\e4" }
  - { key: Key5, mods: Control, chars: "\e5" }
  - { key: Key6, mods: Control, chars: "\e6" }
  - { key: Key7, mods: Control, chars: "\e7" }
  - { key: Key8, mods: Control, chars: "\e8" }
  - { key: Key9, mods: Control, chars: "\e9" }

font:
  normal:
    family: Hack Nerd Font
    style: Regular
  size: 16
  offset:
    x: 1
    y: 2

colors:
  primary:
    background: "0x1a1b26"
    foreground: "0xc0caf5"
  normal:
    black: "0x15161E"
    red: "0xf7768e"
    green: "0x9ece6a"
    yellow: "0xe0af68"
    blue: "0x7aa2f7"
    magenta: "0xbb9af7"
    cyan: "0x7dcfff"
    white: "0xa9b1d6"
  bright:
    black: "0x414868"
    red: "0xf7768e"
    green: "0x9ece6a"
    yellow: "0xe0af68"
    blue: "0x7aa2f7"
    magenta: "0xbb9af7"
    cyan: "0x7dcfff"
    white: "0xc0caf5"
  indexed_colors:
    - { index: 16, color: "0xff9e64" }
    - { index: 17, color: "0xdb4b4b" }
  cursor:
    text: CellBackground
    cursor: "0xc0caf5"

draw_bold_text_with_bright_colors: true

mouse:
  hide_when_typing: true
